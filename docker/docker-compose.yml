services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root_pass
      MYSQL_DATABASE: capteurs_db
      MYSQL_USER: capteurs_user
      MYSQL_PASSWORD: capteurs_pass
    volumes:
      - ../schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  mosquitto:
    image: eclipse-mosquitto:2
    user: root
    volumes:
      - ./mosquitto/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
      - mosquitto_data:/mosquitto/data
      - mosquitto_log:/mosquitto/log
    ports:
      - "1883:1883"
    command: "sh -c 'mosquitto_passwd -b -c /mosquitto/data/passwd mqtt mqtt_pwd && chown mosquitto:mosquitto /mosquitto/data/passwd && chmod 0700 /mosquitto/data/passwd && mosquitto -c /mosquitto/config/mosquitto.conf'"

volumes:
  mysql_data:
  mosquitto_data:
  mosquitto_log:
